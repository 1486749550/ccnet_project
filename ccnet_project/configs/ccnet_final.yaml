seed: 42
device: cuda
num_workers: 4
save_dir: outputs/ccnet_final

dataset:
  train_root: data/final_dataset
  val_root: data/final_dataset
  test_root: data/final_dataset
  use_train_val_split: false
  val_split: 0.2
  image_size: 256
  in_channels: 3
  image_suffix: [.png, .jpg, .jpeg, .tif, .tiff]
  mask_suffix: [.png, .jpg, .jpeg, .tif, .tiff]
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

model:
  in_channels: 3
  base_channels: 32

loss:
  lambda_sep: 0.3
  lambda_sim: 0.3
  lambda_rst: 0.1
  tversky_alpha: 0.7
  tversky_beta: 0.3
  tversky_weight: 1.0

optim:
  epochs: 10
  batch_size: 16
  lr: 0.0003
  weight_decay: 0.0001
  betas: [0.9, 0.999]
  amp: true
  grad_clip: 5.0
  log_interval: 10

scheduler:
  min_lr: 0.000001

inference:
  threshold: 0.5


