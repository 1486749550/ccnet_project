seed: 42
device: cuda
num_workers: 4
save_dir: outputs/ccnet-levir

dataset:
  train_root: data/LEVIR-CD/train
  val_root: data/LEVIR-CD/val
  test_root: data/LEVIR-CD/test
  use_train_val_split: false
  val_split: 0.2
  image_size: 256
  in_channels: 3
  image_suffix: .png
  mask_suffix: .png
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

model:
  in_channels: 3
  base_channels: 32

loss:
  lambda_sep: 0.3
  lambda_sim: 0.3
  lambda_rst: 0.1
  tversky_alpha: 0.8
  tversky_beta: 0.2
  tversky_weight: 1.0

optim:
  epochs: 10
  batch_size: 16
  lr: 0.0003
  weight_decay: 0.0001
  betas: [0.9, 0.999]
  amp: true
  grad_clip: 5.0
  log_interval: 10

scheduler:
  min_lr: 0.000001

inference:
  threshold: 0.5


# python ./ccnet_project/train.py --config ./ccnet_project/configs/ccnet_levir.yaml

# python ./ccnet_project/validate.py --config ./ccnet_project/configs/ccnet_levir.yaml --checkpoint outputs/ccnet_levir/best_f1.pth

# python ./ccnet_project/infer.py --config ./ccnet_project/configs/ccnet_levir.yaml --checkpoint outputs/ccnet_levir/best_f1.pth --save_dir outputs/levir/infer
